<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0c060"/><stop offset=".5" stop-color="#d4a853"/><stop offset="1" stop-color="#e8923a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="62%">
      <stop offset="0" stop-color="#d4a853" stop-opacity=".16"/><stop offset="1" stop-color="#d4a853" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="#0a0a0c"/>
  <rect width="800" height="450" fill="url(#glow)"/>

  <!-- microservices -->
  <g fill="#0e0e11" stroke="url(#g)" stroke-width="2.5">
    <rect x="110" y="70" width="150" height="72" rx="12"/>
    <rect x="325" y="70" width="150" height="72" rx="12"/>
    <rect x="540" y="70" width="150" height="72" rx="12"/>
  </g>
  <g font-family="ui-monospace,monospace" text-anchor="middle">
    <text x="185" y="104" font-size="17" fill="#f0c060">auth-svc</text>
    <text x="400" y="104" font-size="17" fill="#f0c060">game-svc</text>
    <text x="615" y="104" font-size="17" fill="#f0c060">market-svc</text>
    <text x="185" y="126" font-size="11" fill="#8a6a2a">REST</text>
    <text x="400" y="126" font-size="11" fill="#8a6a2a">core</text>
    <text x="615" y="126" font-size="11" fill="#8a6a2a">orders</text>
  </g>

  <!-- service -> bus connectors -->
  <g stroke="url(#g)" stroke-width="2" stroke-dasharray="6 6" opacity=".55">
    <line x1="185" y1="142" x2="185" y2="205"/><line x1="400" y1="142" x2="400" y2="205"/><line x1="615" y1="142" x2="615" y2="205"/>
  </g>
  <g fill="#f0c060"><circle cx="185" cy="206" r="4"/><circle cx="400" cy="206" r="4"/><circle cx="615" cy="206" r="4"/></g>

  <!-- Kafka event bus -->
  <rect x="110" y="204" width="580" height="46" rx="10" fill="#0a0a0c" stroke="url(#g)" stroke-width="2.5"/>
  <text x="400" y="233" font-family="ui-monospace,monospace" font-size="18" fill="#f0c060" text-anchor="middle">Kafka · event bus</text>

  <!-- bus -> database -->
  <line x1="400" y1="250" x2="400" y2="300" stroke="url(#g)" stroke-width="2" stroke-dasharray="6 6" opacity=".55"/>

  <!-- Postgres cylinder -->
  <rect x="354" y="306" width="92" height="52" fill="#0e0e11"/>
  <ellipse cx="400" cy="358" rx="46" ry="13" fill="#0e0e11" stroke="url(#g)" stroke-width="2.5"/>
  <line x1="354" y1="306" x2="354" y2="358" stroke="url(#g)" stroke-width="2.5"/>
  <line x1="446" y1="306" x2="446" y2="358" stroke="url(#g)" stroke-width="2.5"/>
  <ellipse cx="400" cy="306" rx="46" ry="13" fill="#0e0e11" stroke="url(#g)" stroke-width="2.5"/>
  <text x="400" y="340" font-family="ui-monospace,monospace" font-size="15" fill="#d4a853" text-anchor="middle">Postgres</text>

  <text x="70" y="422" font-family="ui-monospace,monospace" font-size="17" letter-spacing="3" fill="#8a6a2a">DOCKER · HIBERNATE ORM</text>
</svg>
